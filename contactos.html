<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos — Portal Drummond</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Drummond</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="quem-somos.html">Quem Somos</a></li>
                <li class="nav-item"><a class="nav-link" href="servicos.html">Serviços</a></li>
                <li class="nav-item"><a class="nav-link active" href="contactos.html">Contactos</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
    <section class="container py-5">
        <h1 class="mb-4">Contactos</h1>
    
        <form id="form-contacto" class="row g-3">
    
            <div class="col-md-6">
                <label class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome">
            </div>
    
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
            </div>
    
            <div class="col-12">
                <label class="form-label">Mensagem</label>
                <textarea class="form-control" id="mensagem" rows="4"></textarea>
            </div>
    
            <div class="col-12">
                <button class="btn btn-dark" type="submit">Enviar</button>
            </div>
    
        </form>
    
        <div class="mt-5">
            <h3>Localização</h3>
            <iframe src="https://maps.google.com/maps?q=itabira&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    width="100%" height="300" style="border:0;"></iframe>
        </div>
    </section>
</main>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="fw-bold mb-1">Portal Drummond</p>
    <p class="small mb-0">© 2026 — Todos os direitos reservados</p>
</footer>

<!-- CHATBOT -->
<button id="chatbot-btn">💬</button>
<div id="chatbot-box">
    <div id="chatbot-messages"></div>
    <div id="chatbot-input-area">
        <input type="text" id="chatbot-input" placeholder="Escreva aqui...">
        <button id="chatbot-send">➤</button>
    </div>
</div>

<script src="js/formulario.js"></script>
<script src="js/chatbot.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
